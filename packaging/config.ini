[app]
split_mode = auto
last_camera_index = 0
log_retention_days = 30
db_retention_days = 30

[window]
geometry = 

[event]
enable = true
heartbeat = 60
connect_timeout = 5
read_timeout = 65
backoff_min = 1
backoff_max = 30
cooldown_sec = 2
stay_cooldown_sec = 2
stay_hold_ms = 10000
log_load_limit = 200

[gpio]
enable = true
pulse_ms = 500
retrigger_policy = extend
console_log = false

[monitor]
idle_stop_enable = true
idle_stop_sec = 300

